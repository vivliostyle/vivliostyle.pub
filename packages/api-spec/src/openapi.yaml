openapi: 3.1.0
info:
  title: Vivliostyle Pub Sync API
  description: >-
    The Vivliostyle Pub Sync API lets you sign in, manage your book

    projects, and keep their contents synchronized across devices.


    - **Sign in** with OAuth 2.1 + PKCE to obtain a bearer token, then send it
    as `Authorization: Bearer <token>` on every other call.

    - **Manage projects** — list, create, update, or delete the books on your
    account.

    - **Read and write project files** — individual text/source files plus
    larger binary assets stored as attachments.

    - **Sync collaboratively** — exchange document updates with other editors in
    realtime over WebSocket, or one-shot over HTTP.


    All endpoints except the ones under **auth** and **capabilities** require a
    valid bearer token.
  version: 0.1.0
servers:
  - url: /
    description: Same origin as this documentation page
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Access token obtained from `POST /auth/oauth2/token`. Send it as
        `Authorization: Bearer <token>`."
    sessionAuth:
      type: http
      scheme: bearer
      description: "Session token obtained from `POST /auth/sign-in`. Send it as
        `Authorization: Bearer <token>`."
tags:
  - name: auth
    description: Sign in and manage access tokens. Uses OAuth 2.1 with PKCE; the
      resulting bearer token authorizes every other endpoint.
  - name: projects
    description: Create, list, update, and delete the book projects on your account.
      Each project is the container for its files, attachments, and
      collaborative-editing state.
  - name: files
    description: Read and write the source files (Markdown, CSS, configuration,
      etc.) inside a project.
  - name: attachments
    description: Upload and fetch binary assets — such as images embedded in a book
      — addressed by their SHA-256 hash. Identical contents are stored only
      once.
  - name: sync
    description: Exchange collaborative-editing updates for a project. The realtime
      channel is a WebSocket; these HTTP endpoints provide the same data for
      clients that cannot keep a socket open. Updates use the Yjs CRDT binary
      format.
  - name: capabilities
    description: Discover the server name, version, and which optional features it supports.
paths:
  /.well-known/vivliostyle-pub:
    get:
      operationId: getWellKnownVivliostylePub
      tags:
        - capabilities
      summary: Capabilities
      description: Returns the server name, supported API versions, and which optional
        features it implements.
      responses:
        "200":
          description: Capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  apiVersions:
                    type: array
                    items:
                      type: string
                  features:
                    type: object
                    properties:
                      sync:
                        type: boolean
                      attachments:
                        type: boolean
                      oauth:
                        type: boolean
                    required:
                      - sync
                      - attachments
                      - oauth
                required:
                  - name
                  - version
                  - apiVersions
                  - features
  /auth/register:
    post:
      operationId: postAuthRegister
      tags:
        - auth
      summary: Register
      description: Creates a new user account; sign in via `/auth/sign-in` afterwards,
        then `/auth/oauth2/authorize` → `/auth/oauth2/token` to obtain access
        tokens.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                required:
                  - id
                  - username
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 64
                password:
                  type: string
                  minLength: 8
                  maxLength: 256
              required:
                - username
                - password
  /auth/sign-in:
    post:
      operationId: postAuthSignIn
      tags:
        - auth
      summary: Sign in
      description: Verifies the username and password and starts a session, returning
        the session token to authorize `/auth/oauth2/authorize`.
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                    required:
                      - id
                      - username
                required:
                  - token
                  - user
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
  /auth/oauth2/authorize:
    get:
      operationId: getAuthOauth2Authorize
      tags:
        - auth
      summary: Authorize
      description: "Issues a short-lived authorization code for the session given in
        the `Authorization: Bearer <session token>` header (from
        `/auth/sign-in`), returning the redirect URI carrying the code to
        exchange via `/auth/oauth2/token` with the matching PKCE verifier."
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Authorization redirect
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect:
                    type: boolean
                  url:
                    type: string
                required:
                  - redirect
                  - url
        "401":
          description: Invalid session
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - in: query
          name: response_type
          schema:
            const: code
            default: code
        - in: query
          name: client_id
          schema:
            type: string
          required: true
        - in: query
          name: redirect_uri
          schema:
            type: string
            format: uri
          required: true
        - in: query
          name: scope
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: code_challenge
          schema:
            type: string
          required: true
        - in: query
          name: code_challenge_method
          schema:
            const: S256
            default: S256
  /auth/oauth2/token:
    post:
      operationId: postAuthOauth2Token
      tags:
        - auth
      summary: Token
      description: Exchanges an authorization code (after `/auth/oauth2/authorize`) or
        a refresh token for an access token. The refresh token is rotated,
        invalidating the previous one.
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    const: Bearer
                  expires_in:
                    type: number
                  refresh_token:
                    type: string
                  scope:
                    type: string
                required:
                  - access_token
                  - token_type
                  - expires_in
                  - refresh_token
        "400":
          description: Invalid grant
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - type: object
                  properties:
                    grant_type:
                      const: authorization_code
                    code:
                      type: string
                    code_verifier:
                      type: string
                    redirect_uri:
                      type: string
                      format: uri
                    client_id:
                      type: string
                  required:
                    - grant_type
                    - code
                    - code_verifier
                    - redirect_uri
                    - client_id
                - type: object
                  properties:
                    grant_type:
                      const: refresh_token
                    refresh_token:
                      type: string
                    client_id:
                      type: string
                  required:
                    - grant_type
                    - refresh_token
                    - client_id
  /auth/oauth2/revoke:
    post:
      operationId: postAuthOauth2Revoke
      tags:
        - auth
      summary: Revoke
      description: Revokes a token (RFC 7009). Revoking a refresh token also drops the
        access tokens of the same grant. Always responds 200, even for an
        unknown or already-revoked token.
      responses:
        "200":
          description: Revoked
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                token_type_hint:
                  enum:
                    - access_token
                    - refresh_token
                  type: string
                client_id:
                  type: string
              required:
                - token
                - client_id
  /auth/oauth2/session:
    delete:
      operationId: deleteAuthOauth2Session
      tags:
        - auth
      summary: Logout
      description: Revokes every access and refresh token issued to the signed-in user.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Revoked
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
  /auth/oauth2/userinfo:
    get:
      operationId: getAuthOauth2Userinfo
      tags:
        - auth
      summary: User info
      description: Returns the signed-in user's OpenID Connect claims.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  sub:
                    type: string
                  name:
                    type: string
                required:
                  - sub
                  - name
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
  /projects:
    get:
      operationId: getProjects
      tags:
        - projects
      summary: List projects
      description: Returns all projects owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        author:
                          type: string
                        language:
                          type: string
                        createdAt:
                          type: number
                        updatedAt:
                          type: number
                      required:
                        - id
                        - createdAt
                        - updatedAt
                required:
                  - projects
    post:
      operationId: postProjects
      tags:
        - projects
      summary: Create project
      description: Creates a new project owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  author:
                    type: string
                  language:
                    type: string
                  createdAt:
                    type: number
                  updatedAt:
                    type: number
                required:
                  - id
                  - createdAt
                  - updatedAt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                language:
                  type: string
              required: []
  /projects/{id}:
    get:
      operationId: getProjectsById
      tags:
        - projects
      summary: Get project
      description: Returns the project's metadata.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  author:
                    type: string
                  language:
                    type: string
                  createdAt:
                    type: number
                  updatedAt:
                    type: number
                required:
                  - id
                  - createdAt
                  - updatedAt
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
    put:
      operationId: putProjectsById
      tags:
        - projects
      summary: Update project
      description: Replaces the project's metadata with the request body.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  author:
                    type: string
                  language:
                    type: string
                  createdAt:
                    type: number
                  updatedAt:
                    type: number
                required:
                  - id
                  - createdAt
                  - updatedAt
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                language:
                  type: string
              required: []
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
    delete:
      operationId: deleteProjectsById
      tags:
        - projects
      summary: Delete project
      description: Removes the project along with all of its files and document state.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
  /projects/{id}/sync/{path}:
    get:
      operationId: getProjectsByIdSyncByPath
      tags:
        - sync
      summary: Sync pull
      description: Returns the Yjs update needed to bring the caller's copy of one
        file up to date — limited to the delta missing from the `sv` state
        vector when supplied, or the full state otherwise.
      security:
        - bearerAuth: []
      parameters:
        - name: sv
          in: query
          required: false
          description: The client's current Yjs state vector, encoded as base64url. Omit
            to receive the full document state.
          schema:
            type: string
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: path
          required: true
      responses:
        "200":
          description: Yjs update
          content: &a1
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
    post:
      operationId: postProjectsByIdSyncByPath
      tags:
        - sync
      summary: Sync push
      description: Applies the Yjs update in the request body and returns the diff the
        caller is still missing — filtered by the `sv` state vector when
        supplied, with an empty body acting as pull-only.
      security:
        - bearerAuth: []
      parameters:
        - name: sv
          in: query
          required: false
          description: The client's current Yjs state vector, encoded as base64url. Omit
            to receive the full document state.
          schema:
            type: string
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: path
          required: true
      requestBody:
        content: *a1
      responses:
        "200":
          description: Merged Yjs update
          content: *a1
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
  /projects/{id}/files:
    get:
      operationId: getProjectsByIdFiles
      tags:
        - files
      summary: List files
      description: Returns every file currently stored in the project, each with a
        SHA-256 `hash` of its content. Pass `download=true` to also receive a
        short-lived `downloadUrl` for fetching each file directly, bypassing
        this API.
      security:
        - bearerAuth: []
      parameters:
        - name: download
          in: query
          required: false
          description: When `true`, include a short-lived direct-download URL on every
            entry.
          schema:
            type: boolean
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        size:
                          type: number
                        contentType:
                          type: string
                        updatedAt:
                          type: number
                        hash:
                          type: string
                        downloadUrl:
                          type: string
                      required:
                        - path
                        - size
                        - contentType
                        - updatedAt
                required:
                  - files
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
    post:
      operationId: postProjectsByIdFiles
      tags:
        - files
      summary: Write files (batch)
      description: Creates or replaces multiple files and deletes others in a single
        request, to avoid one round-trip per file. Send `multipart/form-data`
        where each file part is named by its project-relative path, and each
        form field named `$delete` carries one path to remove. Returns the
        resulting entries (with hashes) for the written files.
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                $delete:
                  type: array
                  items:
                    type: string
                  description: Project-relative paths to delete.
              additionalProperties:
                type: string
                format: binary
      responses:
        "200":
          description: Written files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        size:
                          type: number
                        contentType:
                          type: string
                        updatedAt:
                          type: number
                        hash:
                          type: string
                        downloadUrl:
                          type: string
                      required:
                        - path
                        - size
                        - contentType
                        - updatedAt
                required:
                  - files
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
  /files-download/{id}/{path}:
    get:
      operationId: getFilesDownloadByIdByPath
      tags:
        - files
      summary: Download a file via a signed URL
      description: Returns the file's raw bytes for a URL minted by the file listing's
        `download=true` mode. Authorized by the `exp`/`sig` query pair rather
        than a bearer token.
      responses:
        "200":
          description: File contents
          content: *a1
        "403":
          description: Invalid signature
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: path
          required: true
  /projects/{id}/files/{path}:
    get:
      operationId: getProjectsByIdFilesByPath
      tags:
        - files
      summary: Read file
      description: Returns the file's raw bytes.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: File contents
          content: *a1
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: path
          required: true
    put:
      operationId: putProjectsByIdFilesByPath
      tags:
        - files
      summary: Write file
      description: Creates or replaces the file at the given path.
      security:
        - bearerAuth: []
      requestBody:
        content: *a1
      responses:
        "204":
          description: Saved
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: path
          required: true
    delete:
      operationId: deleteProjectsByIdFilesByPath
      tags:
        - files
      summary: Delete file
      description: Removes the file and drops its associated CRDT state.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: path
          required: true
  /projects/{id}/attachments/{sha256}:
    get:
      operationId: getProjectsByIdAttachmentsBySha256
      tags:
        - attachments
      summary: Get attachment
      description: Returns the attachment whose SHA-256 hex digest matches the path
        parameter.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Attachment bytes
          content: *a1
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: sha256
          required: true
    put:
      operationId: putProjectsByIdAttachmentsBySha256
      tags:
        - attachments
      summary: Put attachment
      description: Stores the attachment keyed by its SHA-256 hex digest; the request
        body's digest must match the path parameter, and uploading the same hash
        twice is idempotent.
      security:
        - bearerAuth: []
      requestBody:
        content: *a1
      responses:
        "201":
          description: Stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  sha256:
                    type: string
                  size:
                    type: number
                required:
                  - sha256
                  - size
        "400":
          description: Hash mismatch
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
